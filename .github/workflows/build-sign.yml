name: build-sign

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/sc942958/signed_hello

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Derive build metadata
        id: prep
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.1.0-dev"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "revision=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=match,pattern=v(.*),group=1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=signed_hello
            org.opencontainers.image.description=Minimal C hello-world container with OCI metadata, SBOM, provenance, and keyless Sigstore signing
            org.opencontainers.image.vendor=West Chester University demo
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Show resolved tags
        run: |
          echo "Resolved tags:"
          echo "${{ steps.meta.outputs.tags }}"

      - name: Build image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          build-args: |
            VERSION=${{ steps.prep.outputs.version }}
            VCS_REF=${{ steps.prep.outputs.revision }}
            CREATED=${{ steps.prep.outputs.created }}

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v4.1.1

      - name: Sign image digest with Cosign (keyless)
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Verify signature in CI
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.build.outputs.digest }}
          CERT_IDENTITY: ${{ github.server_url }}/${{ github.repository }}/.github/workflows/build-sign.yml@${{ github.ref }}
        run: |
          cosign verify \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity "${CERT_IDENTITY}" \
            "${IMAGE}@${DIGEST}"
